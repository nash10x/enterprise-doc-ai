services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  chromadb-admin:
    image: ghcr.io/flanker/chromadb-admin:latest
    ports:
      - "3000:3000"
    environment:
      - CHROMADB_URL=http://chromadb:8000
    depends_on:
      - chromadb

  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./docs:/app/docs:ro
      - docstore_data:/app/docstore
    depends_on:
      - chromadb
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000

volumes:
  chroma_data:
  docstore_data:
